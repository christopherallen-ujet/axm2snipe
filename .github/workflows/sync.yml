
on:
  schedule:
    # Runs every day at 6:00 AM UTC (11 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build axm2snipe
        run: go build -o axm2snipe .

      - name: Create config files
        run: |
          echo "${{ secrets.ABM_PRIVATE_KEY }}" > axm2snipe.pem
          cat > settings.yaml <<EOF
          ${{ secrets.SETTINGS_YAML }}
          EOF

      - name: Run sync
        run: ./axm2snipe sync --verbose
