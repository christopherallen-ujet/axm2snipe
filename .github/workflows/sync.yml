name: ABM to Snipe-IT Sync

on:
  schedule:
    # Runs every day at 10:00 AM PST (6 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build axm2snipe
        run: go build -o axm2snipe .

      - name: Create config files
        run: |
          echo "${{ secrets.ABM_PRIVATE_KEY }}" > axm2snipe.pem
          cat > settings.yaml <<EOF
          ${{ secrets.SETTINGS_YAML }}
          EOF

      - name: Notify Slack - sync starting
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data @- ${{ secrets.SLACK_WEBHOOK_URL }} <<'EOF'
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "ABM → Snipe-IT Sync Started",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":loading: Syncing devices from Apple Business Manager into Snipe-IT..."
                }
              }
            ]
          }
          EOF

      - name: Run sync
        id: sync
        run: |
          ./axm2snipe sync --verbose 2>&1 | tee sync_output.log
          STATS_LINE=$(grep "Sync complete:" sync_output.log | tail -1)
          TOTAL=$(echo "$STATS_LINE" | grep -oE 'total=[0-9]+' | cut -d= -f2)
          CREATED=$(echo "$STATS_LINE" | grep -oE 'created=[0-9]+' | cut -d= -f2)
          UPDATED=$(echo "$STATS_LINE" | grep -oE 'updated=[0-9]+' | cut -d= -f2)
          SKIPPED=$(echo "$STATS_LINE" | grep -oE 'skipped=[0-9]+' | cut -d= -f2)
          ERRORS=$(echo "$STATS_LINE" | grep -oE 'errors=[0-9]+' | cut -d= -f2)
          NEW_MODELS=$(echo "$STATS_LINE" | grep -oE 'new_models=[0-9]+' | cut -d= -f2)
          echo "TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
          echo "CREATED=${CREATED:-0}" >> $GITHUB_ENV
          echo "UPDATED=${UPDATED:-0}" >> $GITHUB_ENV
          echo "SKIPPED=${SKIPPED:-0}" >> $GITHUB_ENV
          echo "ERRORS=${ERRORS:-0}" >> $GITHUB_ENV
          echo "NEW_MODELS=${NEW_MODELS:-0}" >> $GITHUB_ENV

      - name: Notify Slack - sync complete
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data @- ${{ secrets.SLACK_WEBHOOK_URL }} <<EOF
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "ABM → Snipe-IT Sync Complete",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":white_check_mark: Sync completed successfully!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":computer: *Total Devices:* ${TOTAL}\n:white_check_mark: *Updated:* ${UPDATED}\n:sparkles: *Created:* ${CREATED}\n:fast_forward: *Skipped:* ${SKIPPED}\n:new: *New Models:* ${NEW_MODELS}\n:warning: *Errors:* ${ERRORS}"
                }
              }
            ]
          }
          EOF

      - name: Notify Slack - sync failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data @- ${{ secrets.SLACK_WEBHOOK_URL }} <<'EOF'
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "ABM → Snipe-IT Sync Failed",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":x: The sync workflow failed. Please contact IT to investigate."
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow logs (admin only)>"
                  }
                ]
              }
            ]
          }
          EOF
